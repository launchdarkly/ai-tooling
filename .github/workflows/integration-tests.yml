name: Gram Functions Integration Tests

on:
  workflow_dispatch:
    inputs:
      server:
        description: "MCP server to test (metrics-catfood / fm / launchdarkly-catfood / all)"
        required: false
        default: "all"

jobs:
  integration-tests:
    name: Integration Tests (catfood)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out gram-functions alongside agent-skills in CI
          # Adjust path if repos are separate
          path: agent-skills

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install gram-functions dependencies
        working-directory: ../gram-functions
        run: pnpm install

      - name: Run integration tests
        working-directory: ../gram-functions
        run: pnpm run test:integration
        env:
          GRAM_API_KEY: ${{ secrets.GRAM_API_KEY }}
          INTEGRATION_PROJECT_KEY: ${{ secrets.INTEGRATION_PROJECT_KEY || 'anthony-agent-dev-3684' }}
