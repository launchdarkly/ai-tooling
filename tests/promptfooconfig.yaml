description: LaunchDarkly Agent Skills Evaluation Suite

# This root config runs all evals when used with the npm scripts.
# Individual domains: npm run eval:metrics / eval:flags / eval:aiconfigs
# Full suite: npm run eval
#
# Promptfoo does not support config aggregation in the root file — 
# use the CLI scripts or run individual eval files directly:
#   npx promptfoo eval --config evals/metrics/metric-create.eval.yaml

providers:
  - id: anthropic:claude-3-haiku-20240307-mini
    config:
      temperature: 0.1

prompts:
  - label: smoke-test
    raw: |
      [{"role": "user", "content": "Hello, is the eval suite configured correctly? Respond with one word: yes"}]

evaluateOptions:
  maxConcurrency: 4

tests:
  - description: "Smoke test — verifies promptfoo can reach the provider"
    assert:
      - type: contains
        value: "yes"
