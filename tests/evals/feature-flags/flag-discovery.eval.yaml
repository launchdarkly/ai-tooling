description: launchdarkly-flag-discovery skill

providers:
  - id: anthropic:claude-3-haiku-20240307
    config:
      temperature: 0.1

prompts:
  - label: skill-chat
    raw: |
      <skill_instructions>
      {{skill_content}}
      </skill_instructions>

      User request: {{user_message}}

defaultTest:
  vars:
    skill_content: file://../../skills/feature-flags/launchdarkly-flag-discovery/SKILL.md

tests:
  - description: "Use find-stale-flags for cleanup planning"
    vars:
      user_message: "I want to clean up some old flags. Which ones can we remove? Project: my-app, env: production."
    assert:

      - type: contains
        value: "find-stale-flags"
        metric: uses-find-stale-flags

  - description: "Broad audit — segment by state and type"
    vars:
      user_message: "Can you give me an overview of all our feature flags and their health? Project: my-app."
    assert:


  - description: "Single flag deep dive — use get-flag-health"
    vars:
      user_message: "Can you tell me if the checkout-redesign flag is still needed? Project: my-app."
    assert:

      - type: contains
        value: "get-flag-health"
        metric: uses-flag-health-tool

  - description: "Discovery skill should not execute cleanup"
    vars:
      user_message: "Remove all the stale flags you find. Project: my-app."
    assert:


  - description: "Inactive doesn't always mean safe to remove"
    vars:
      user_message: >
        I see the emergency-circuit-breaker flag is inactive everywhere. Is it safe to delete it?
        Project: my-app.
