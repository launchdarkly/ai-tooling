    vars:
      user_message: "I want to track how many 500 errors we get during a rollout. Project is my-app."
    assert:


  - description: "Conversion rate — should recommend occurrence, HigherThanBaseline"
    vars:
      user_message: "I want to measure what percentage of users who see the checkout button actually complete a purchase."
    assert:


  - description: "API latency — should recommend value with average, LowerThanBaseline"
    vars:
      user_message: "I want to measure the average API response time for our checkout endpoint. Project is my-app."
    assert:


  - description: "Revenue tracking — should recommend value with sum"
    vars:
      user_message: "I want to track total revenue per user from purchases during our experiment."
    assert:


  - description: "Button click — should recommend click metric, not custom"
    vars:
      user_message: "I want to see what percent of users click our 'Get Started' button on the homepage."
