description: launchdarkly-metric-instrument skill

providers:
  - id: anthropic:claude-3-haiku-20240307
    config:
      temperature: 0.1

prompts:
  - label: skill-chat
    raw: |
      <skill_instructions>
      {{skill_content}}
      </skill_instructions>

      User request: {{user_message}}

defaultTest:
  vars:
    skill_content: file://../../skills/metrics/launchdarkly-metric-instrument/SKILL.md

tests:
  - description: "React app instrumentation — should install react SDK and use LDProvider"
    vars:
      user_message: >
        I need to instrument a track() call for the event key 'checkout-completed' in my React
        app at ./frontend. The LaunchDarkly project is my-app and environment is production.
    assert:

      - type: contains
        value: "get-environment"
        metric: fetches-sdk-key

  - description: "Non-standard LD host — should add base URL env vars"
    vars:
      user_message: >
        I'm using LaunchDarkly at app.ld.catamorphic.com (not the standard app.launchdarkly.com).
        I need to add a track() call for 'signup-submitted' in my React app. Project is my-app-catfood.
    assert:


  - description: "Value metric track() call — should pass numeric value as third argument"
    vars:
      user_message: >
        I need to add instrumentation for a value metric tracking purchase amount.
        The event key is 'purchase-completed' and I need to pass the order total to the metric.
        App is a React app at ./shop.
    assert:

      - type: contains
        value: "null"
        metric: value-metric-track-format

  - description: "Verify events after instrumentation — should call list-metric-events"
    vars:
      user_message: >
        I've just added a track('form-submitted') call to my app. How do I verify that
        LaunchDarkly is actually receiving the events? Project is my-app.
    assert:

      - type: contains
        value: "list-metric-events"
        metric: uses-list-metric-events
