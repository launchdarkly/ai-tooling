description: aiconfig-variations skill

providers:
  - id: anthropic:claude-3-haiku-20240307
    config:
      temperature: 0.1

prompts:
  - label: skill-chat
    raw: |
      <skill_instructions>
      {{skill_content}}
      </skill_instructions>

      User request: {{user_message}}

defaultTest:
  vars:
    skill_content: file://../../skills/ai-configs/aiconfig-variations/SKILL.md

tests:
  - description: "Test one thing at a time"
    vars:
      user_message: "I want to try a cheaper model with a better prompt and lower temperature for my customer-support-agent config."
    assert:


  - description: "Clone for incremental experiments"
    vars:
      user_message: "I want to try GPT-4o-mini instead of GPT-4o for cost savings. My current variation is v1. Project is my-ai-app."
    assert:

      - type: contains
        value: "clone-ai-config-variation"
        metric: uses-clone

  - description: "A/B test requires targeting setup"
    vars:
      user_message: "I've created two variations (gpt4o and gpt4o-mini) for my AI config. How do I run an A/B test?"
    assert:


  - description: "Verify variation has model set (not NO MODEL)"
    vars:
      user_message: "I created a variation but it shows 'NO MODEL' in the LaunchDarkly UI. Why?"
