description: aiconfig-tools skill

providers:
  - id: anthropic:claude-3-haiku-20240307
    config:
      temperature: 0.1

prompts:
  - label: skill-chat
    raw: |
      <skill_instructions>
      {{skill_content}}
      </skill_instructions>

      User request: {{user_message}}

defaultTest:
  vars:
    skill_content: file://../../skills/ai-configs/aiconfig-tools/SKILL.md

tests:
  - description: "Create tool first, then attach to variation"
    vars:
      user_message: >
        I want to give my AI agent a 'search_knowledge_base' tool that accepts a query string.
        My config is customer-support-agent in project my-ai-app.
    assert:

      - type: contains
        value: "create-ai-tool"
        metric: creates-tool-first

  - description: "Check for existing tools before creating"
    vars:
      user_message: "Add a web search tool to my assistant-config. Project: my-ai-app."
    assert:

      - type: contains
        value: "list-ai-tools"
        metric: checks-existing-tools

  - description: "Tool parameters must be valid JSON Schema"
    vars:
      user_message: "Create an AI tool called 'get-customer-info' that takes a customer_id (string, required) and optional include_history (boolean)."
