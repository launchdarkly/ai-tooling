description: aiconfig-create skill

providers:
  - id: anthropic:claude-3-haiku-20240307
    config:
      temperature: 0.1

prompts:
  - label: skill-chat
    raw: |
      <skill_instructions>
      {{skill_content}}
      </skill_instructions>

      User request: {{user_message}}

defaultTest:
  vars:
    skill_content: file://../../skills/ai-configs/aiconfig-create/SKILL.md

tests:
  - description: "Agent mode for LangGraph app"
    vars:
      user_message: "I'm building a LangGraph agent and want to manage its system instructions through LaunchDarkly. Project is my-ai-app."
    assert:

      - type: contains
        value: "agent"
        metric: selects-agent-mode

  - description: "Completion mode for direct OpenAI API calls"
    vars:
      user_message: "I'm using the OpenAI SDK directly to make chat completions. I want to control the model and system prompt through LaunchDarkly. Project is my-chatbot."
    assert:

      - type: contains
        value: "completion"
        metric: selects-completion-mode

  - description: "Two-step creation — config then variation"
    vars:
      user_message: "Create an AI config called customer-support-agent for project my-ai-app. It should use GPT-4o."
    assert:

      - type: contains
        value: "create-ai-config-variation"
        metric: creates-variation

  - description: "modelConfigKey format — must be Provider.model-id"
    vars:
      user_message: "Set up an AI config using Claude claude-3-5-sonnet for project my-ai-app."
    assert:


  - description: "Verify after creation — get-ai-config"
    vars:
      user_message: "I've just created an AI config. How do I verify it was set up correctly?"
    assert:

      - type: contains
        value: "get-ai-config"
        metric: verifies-config
